<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link href="asset/css/style.css" rel="stylesheet" />

    <script src="asset/js/theme-angpao.js" defer></script>
    <script src="asset/js/audio.js" defer></script>
    <script src="asset/js/script.js" defer></script>

</head>
<body>
    <section class="redPacketDemo">
        <div class="rainGame">
            <div class="rainGame__top">
                <div class="rainGame__topMain">
                    <img src="asset/image/angpao/header.png" class="rainTopHeader" alt="Angpow Rain" />

                    <div class="rainTimerBox">
                        <div class="rainGame__label">Time Left</div>

                        <div class="rainTimerBar" aria-label="Time Left">
                            <div class="rainTimerBar__fill" id="rainTimerBarFill"></div>
                            <div class="rainTimerBar__text">
                                <span id="rainTimer">15</span>s
                            </div>
                        </div>
                    </div>
                </div>

                <div class="rainHitPill">
                    <span>Hits</span>
                    <b id="rainHits">0</b>
                </div>
            </div>

            <div class="rainGame__stage" id="rainStage">
                <div class="rainGame__intro" id="rainIntro">
                    <img src="asset/image/angpao/header.png" class="rainHeader" />
                    <button class="rainGame__startBtn" id="startRainBtn" type="button">
                        START RAIN
                    </button>
                </div>
            </div>
        </div>

        <div class="rainResult" id="rainResult" aria-hidden="true">
            <div class="rainResult__card" id="rainResultCard">
                <img src="asset/image/angpao/header.png" class="resultHeader" alt="Angpow Rain" />

                <div class="rainResult__content">
                    <div class="rainResult__badge" id="resultBadge">WIN</div>

                    <h2 class="rainResult__title" id="resultTitle">Congratulations!</h2>
                    <p class="rainResult__desc" id="resultDesc">You collected</p>

                    <div class="rainResult__amountBox">
                        <div class="rainResult__amountLabel">TOTAL WIN</div>
                        <div class="rainResult__amount">
                            RM <span id="finalAmount">0.00</span>
                        </div>
                    </div>

                    <div class="rainResult__meta" style="display:none;">
                        <div class="rainResult__metaItem">
                            <span>Hits</span>
                            <b id="finalHits">0</b>
                        </div>

                        <div class="rainResult__metaItem">
                            <span>Reward</span>
                            <b id="rewardType">Demo Bonus</b>
                        </div>
                    </div>

                    <button class="rainResult__btn" id="playAgainBtn" type="button">
                        PLAY AGAIN
                    </button>
                </div>
            </div>
        </div>

    </section>

    <!-- Demo only: BGM switcher for testing bgm.mp3 / bgm2.mp3 / bgm3.mp3 / bgm4.mp3. -->
    <button class="bgmSwitchBtn" id="bgmSwitchBtn" type="button" aria-label="Switch BGM">
        BGM 1 / 4
    </button>

    <style>
        .bgmSwitchBtn { position: fixed; left: max(14px, env(safe-area-inset-left)); bottom: max(14px, env(safe-area-inset-bottom)); z-index: 9999; min-width: 92px; border: 1px solid rgba(255, 255, 255, 0.48); border-radius: 999px; padding: 10px 15px; background: rgba(20, 20, 20, 0.74); color: #fff; font-size: 13px; font-weight: 800; letter-spacing: 0.04em; line-height: 1; box-shadow: 0 8px 22px rgba(0, 0, 0, 0.24), inset 0 1px 0 rgba(255, 255, 255, 0.22); backdrop-filter: blur(8px); cursor: pointer; -webkit-tap-highlight-color: transparent; }

            .bgmSwitchBtn:active { transform: translateY(1px) scale(0.98); }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const switchBtn = document.getElementById("bgmSwitchBtn");

            if (!switchBtn || !window.RainAudio || !window.RainTheme) return;

            const audioPath = window.RainTheme.get().audioPath;
            const bgmList = [
                `${audioPath}bgm.mp3`,
                `${audioPath}bgm7_suno.mp3`,
                `${audioPath}bgm8_suno2.mp3`,
                `${audioPath}bgm4.mp3`
            ];

            const BGM_NORMAL_VOLUME = 0.35;
            const BGM_DUCK_NORMAL_WIN_VOLUME = 0.12;
            const BGM_DUCK_BIG_WIN_VOLUME = 0.06;

            let bgmIndex = 0;
            let hasBgmStarted = false;
            const demoBgm = new Audio(bgmList[bgmIndex]);

            demoBgm.loop = true;
            demoBgm.volume = BGM_NORMAL_VOLUME;

            function updateSwitchLabel() {
                switchBtn.textContent = `BGM ${bgmIndex + 1} / ${bgmList.length}`;
            }

            function startDemoBgm() {
                demoBgm.loop = true;
                demoBgm.play()
                    .then(() => {
                        hasBgmStarted = true;
                    })
                    .catch(() => {
                        // Browser may block audio until the first user interaction.
                    });
            }

            function restoreDemoBgm() {
                demoBgm.volume = BGM_NORMAL_VOLUME;
            }

            function duckDemoBgm(volume) {
                demoBgm.volume = volume;
            }

            const originalPlayResult = window.RainAudio.playResult;
            const originalStopResultSounds = window.RainAudio.stopResultSounds;

            window.RainAudio.startBgm = startDemoBgm;
            window.RainAudio.restoreBgm = restoreDemoBgm;
            window.RainAudio.duckBgm = duckDemoBgm;
            window.RainAudio.bindAutoplayFallback = () => {
                document.addEventListener("pointerdown", startDemoBgm, { once: true });
                document.addEventListener("keydown", startDemoBgm, { once: true });
            };
            window.RainAudio.playResult = (resultType) => {
                originalPlayResult(resultType);
                duckDemoBgm(resultType === "big" ? BGM_DUCK_BIG_WIN_VOLUME : BGM_DUCK_NORMAL_WIN_VOLUME);
            };
            window.RainAudio.stopResultSounds = () => {
                originalStopResultSounds();
                restoreDemoBgm();
            };

            switchBtn.addEventListener("click", () => {
                const wasPlaying = hasBgmStarted && !demoBgm.paused;

                bgmIndex = (bgmIndex + 1) % bgmList.length;
                demoBgm.pause();
                demoBgm.currentTime = 0;
                demoBgm.src = bgmList[bgmIndex];
                demoBgm.volume = BGM_NORMAL_VOLUME;
                updateSwitchLabel();

                if (wasPlaying || hasBgmStarted) {
                    startDemoBgm();
                }
            });

            demoBgm.addEventListener("error", () => {
                console.warn("BGM file not found or cannot be played:", bgmList[bgmIndex]);
            });

            updateSwitchLabel();
        });
    </script>

</body>
</html>
