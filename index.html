<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link href="asset/css/style.css" rel="stylesheet" />

    <script src="asset/js/theme-angpao.js" defer></script>
    <script src="asset/js/audio.js" defer></script>
    <script src="asset/js/script.js" defer></script>

</head>
<body>
    <section class="redPacketDemo">
        <div class="rainGame">
            <div class="rainGame__top">
                <div class="rainGame__topMain">
                    <img src="asset/image/angpao/header.png" class="rainTopHeader" alt="Angpow Rain" />

                    <div class="rainTimerBox">
                        <div class="rainGame__label">Time Left</div>

                        <div class="rainTimerBar" aria-label="Time Left">
                            <div class="rainTimerBar__fill" id="rainTimerBarFill"></div>
                            <div class="rainTimerBar__text">
                                <span id="rainTimer">15</span>s
                            </div>
                        </div>
                    </div>
                </div>

                <div class="rainHitPill">
                    <span>Hits</span>
                    <b id="rainHits">0</b>
                </div>
            </div>

            <div class="rainGame__stage" id="rainStage">
                <div class="rainGame__intro" id="rainIntro">
                    <img src="asset/image/angpao/header.png" class="rainHeader" />
                    <button class="rainGame__startBtn" id="startRainBtn" type="button">
                        START RAIN
                    </button>
                </div>
            </div>
        </div>

        <div class="rainResult" id="rainResult" aria-hidden="true">
            <div class="rainResult__card" id="rainResultCard">
                <img src="asset/image/angpao/header.png" class="resultHeader" alt="Angpow Rain" />

                <div class="rainResult__content">
                    <div class="rainResult__badge" id="resultBadge">WIN</div>

                    <h2 class="rainResult__title" id="resultTitle">Congratulations!</h2>
                    <p class="rainResult__desc" id="resultDesc">You collected</p>

                    <div class="rainResult__amountBox">
                        <div class="rainResult__amountLabel">TOTAL WIN</div>
                        <div class="rainResult__amount">
                            RM <span id="finalAmount">0.00</span>
                        </div>
                    </div>

                    <div class="rainResult__meta" style="display:none;">
                        <div class="rainResult__metaItem">
                            <span>Hits</span>
                            <b id="finalHits">0</b>
                        </div>

                        <div class="rainResult__metaItem">
                            <span>Reward</span>
                            <b id="rewardType">Demo Bonus</b>
                        </div>
                    </div>

                    <button class="rainResult__btn" id="playAgainBtn" type="button">
                        PLAY AGAIN
                    </button>
                </div>
            </div>
        </div>

    </section>

    <div class="rainEligibility" id="rainEligibility" data-eligible="true"
         role="dialog" aria-modal="true" aria-labelledby="rainEligibilityTitle"
         aria-hidden="true">
        <div class="rainEligibility__card">
            <img src="asset/image/angpao/item.png"
                 class="rainFloatingItem rainFloatingItem--one"
                 alt="" aria-hidden="true" />
            <img src="asset/image/angpao/item2.png"
                 class="rainFloatingItem rainFloatingItem--two"
                 alt="" aria-hidden="true" />

            <img src="asset/image/angpao/dec02.png" class="fwFloatingItem fwFloatingItem--one" />
            <img src="asset/image/angpao/dec03.png" class="fwFloatingItem fwFloatingItem--two" />

            <div class="rainEligibility__head">
                <img src="asset/image/angpao/header_2.png"
                     class="rainEligibility__logo rainEligibility__header" alt="Angpow Rain" />
            </div>

            <div class="rainEligibility__panel">
                <div class="rainEligibility__status" id="rainEligibilityStatus"
                     aria-hidden="true">✓</div>
                <h2 class="rainEligibility__title" id="rainEligibilityTitle">
                    You have 1 play available!
                </h2>
                <p class="rainEligibility__message" id="rainEligibilityMessage">
                    Try your luck and win big rewards!
                </p>
                <a class="rainEligibility__action" id="rainEligibilityAction" href="#">
                    PLAY NOW
                </a>
            </div>

            <button class="rainEligibility__later" id="rainEligibilityLater" type="button">
                Later
            </button>
        </div>
    </div>

    <script>
        /*
         * BACKEND INTEGRATION
         * Replace these values with the member's eligibility response.
         */
        /*
         * TESTING ONLY
         * Each page refresh randomly returns either 0 or 1 available play.
         * Remove this random value when the backend eligibility API is ready.
         */
        var randomPlayCount = Math.floor(Math.random() * 2);

        window.JACKPOT_RAIN_ACCESS = window.JACKPOT_RAIN_ACCESS || {
            hasPlay: randomPlayCount > 0,
            plays: randomPlayCount,
            depositUrl: "#",
            laterFallbackUrl: "#"
        };

        (function () {
            var popup = document.getElementById("rainEligibility");
            var status = document.getElementById("rainEligibilityStatus");
            var title = document.getElementById("rainEligibilityTitle");
            var message = document.getElementById("rainEligibilityMessage");
            var action = document.getElementById("rainEligibilityAction");
            var later = document.getElementById("rainEligibilityLater");

            function renderJackpotRainAccess(access) {
                var hasPlay = Boolean(access && access.hasPlay);
                var plays = Math.max(0, Number(access && access.plays) || 0);

                popup.dataset.eligible = String(hasPlay);
                status.textContent = hasPlay ? "✓" : "×";

                if (hasPlay) {
                    title.textContent = "You have " + plays + " play" +
                        (plays === 1 ? "" : "s") + " available!";
                    message.textContent = "Try your luck and win big rewards!";
                    action.textContent = "PLAY NOW";
                    action.setAttribute("href", "#");
                } else {
                    title.textContent = "You don’t have any plays.";
                    message.textContent = "Please deposit to get more plays!";
                    action.textContent = "DEPOSIT NOW";
                    action.setAttribute("href", access.depositUrl || "#");
                }

                popup.classList.add("is-open");
                popup.setAttribute("aria-hidden", "false");
            }

            function closeJackpotRainAccess() {
                popup.classList.remove("is-open");
                popup.setAttribute("aria-hidden", "true");
            }

            action.addEventListener("click", function (event) {
                var access = window.JACKPOT_RAIN_ACCESS;

                if (access.hasPlay) {
                    event.preventDefault();
                    closeJackpotRainAccess();
                    document.getElementById("startRainBtn").focus();
                    return;
                }

                if (!access.depositUrl || access.depositUrl === "#") {
                    event.preventDefault();
                }
            });

            later.addEventListener("click", function () {
                var fallbackUrl = window.JACKPOT_RAIN_ACCESS.laterFallbackUrl || "#";

                if (window.history.length > 1) {
                    window.history.back();
                } else if (fallbackUrl !== "#") {
                    window.location.href = fallbackUrl;
                }
            });

            /*
             * Backend can call this after an async eligibility request:
             * window.setJackpotRainAccess({ hasPlay: false, plays: 0 });
             */
            window.setJackpotRainAccess = function (nextAccess) {
                window.JACKPOT_RAIN_ACCESS = Object.assign(
                    {},
                    window.JACKPOT_RAIN_ACCESS,
                    nextAccess || {}
                );
                renderJackpotRainAccess(window.JACKPOT_RAIN_ACCESS);
            };

            document.addEventListener("DOMContentLoaded", function () {
                renderJackpotRainAccess(window.JACKPOT_RAIN_ACCESS);
            });
        }());
    </script>

</body>
</html>
